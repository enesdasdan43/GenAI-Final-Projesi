        .nav-actions { display: flex; gap: 10px; border-left: 1px solid var(--glass-border); padding-left: 15px; }
        .theme-toggle-btn, .lang-btn { background: transparent; border: none; color: var(--text-main); cursor: pointer; display: flex; align-items: center; font-family: 'Fira Code', monospace; font-size: 0.85rem; padding: 5px; transition: 0.3s; }
        .lang-btn:hover, .lang-btn.active { color: var(--primary); font-weight: bold; }
        
        section { padding: 150px 0 5rem 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .section-title { font-size: 2.5rem; text-align: center; margin-bottom: 4rem; width: 100%; display: block; font-weight: 700; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 3rem; }
        .info-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 3.5rem 2.5rem; border-radius: 25px; text-align: center; transition: 0.4s; position: relative; overflow: hidden; box-shadow: var(--card-shadow); }
        .info-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .skill-wrapper { margin-top: 2rem; text-align: left; }

        .skill-bar { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; }
        .skill-fill { height: 100%; background: var(--primary); border-radius: 5px; width: var(--w); }
        .icon-wrap { font-size: 2.5rem; margin-bottom: 1.5rem; color: var(--primary); }

        .back-to-home { position: fixed; top: 25px; left: 5%; z-index: 1100; padding: 0.8rem 1.5rem; background: var(--primary); color: #fff; border-radius: 30px; text-decoration: none; font-weight: 700; }

    <script>
        // --- ÇEVİRİ SİSTEMİ ---
        const translations = {
            tr: {
                nav_bio: "Hakkımda", nav_about: "Uzmanlıklar", nav_projects: "Projeler", nav_contact: "Üyelik",
                title_about: "Uzmanlık Alanlarım",
                skill_web: "Site Geliştirme", skill_game: "Oyun Tasarlama", skill_design: "Grafik Tasarlama",
                skill_mech: "Mekanik", skill_uiux: "UI/UX Tasarımı",
                back_home: '<i class="fas fa-arrow-left"></i> Ana Sayfa'
            },
            en: {
                nav_bio: "About Me", nav_about: "Expertise", nav_projects: "Projects", nav_contact: "Membership",
                title_about: "My Expertise",
                skill_web: "Web Development", skill_game: "Game Design", skill_design: "Graphic Design",
                skill_mech: "Mechanics", skill_uiux: "UI/UX Design",
                back_home: '<i class="fas fa-arrow-left"></i> Home'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'tr';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (translations[lang][key]) el.innerHTML = translations[lang][key];
            });
        }
        setLanguage(currentLang);

        const themeBtn = document.getElementById('theme-toggle');
        function updateThemeIcon() { const isLight = document.body.classList.contains('light-mode'); themeBtn.querySelector('i').className = isLight ? 'fas fa-sun' : 'fas fa-moon'; }
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        themeBtn.addEventListener('click', () => { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); updateThemeIcon(); });
        updateThemeIcon();
    </script>
