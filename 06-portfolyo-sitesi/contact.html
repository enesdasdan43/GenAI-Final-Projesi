    <style>
        :root { --bg-color: #050505; --text-main: #ffffff; --text-muted: #a1a1aa; --primary: #7c3aed; --secondary: #d8b4fe; --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); --nav-bg: rgba(5, 5, 5, 0.85); --card-shadow: 0 10px 30px rgba(109, 40, 217, 0.15); --success: #8b5cf6; --danger: #ef4444; }
        body.light-mode { --bg-color: #f5f3ff; --text-main: #1e1b4b; --text-muted: #4c1d95; --primary: #7c3aed; --secondary: #4c1d95; --glass-bg: rgba(124, 58, 237, 0.05); --glass-border: rgba(124, 58, 237, 0.1); --nav-bg: rgba(245, 243, 255, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rubik', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; }
        header { position: fixed; top: 0; width: 100%; padding: 0.7rem 5%; display: flex; justify-content: flex-end; align-items: center; z-index: 1000; backdrop-filter: blur(15px); background: var(--nav-bg); border-bottom: 1px solid var(--glass-border); }
        .nav-container { display: flex; align-items: center; gap: 1.5rem; }
        nav ul { display: flex; gap: 2rem; list-style: none; }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: 500; }
        nav a:hover, nav a.active { color: var(--primary); }
        .nav-actions { display: flex; gap: 10px; border-left: 1px solid var(--glass-border); padding-left: 15px; }
        .theme-toggle-btn, .lang-btn { background: transparent; border: none; color: var(--text-main); cursor: pointer; display: flex; align-items: center; font-family: 'Fira Code', monospace; font-size: 0.85rem; padding: 5px; transition: 0.3s; }
        .lang-btn:hover, .lang-btn.active { color: var(--primary); font-weight: bold; }
        
        section { padding: 150px 0 5rem 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .section-title { font-size: 2.5rem; text-align: center; margin-bottom: 4rem; width: 100%; display: block; font-weight: 700; }

        .auth-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 4rem; border-radius: 30px; backdrop-filter: blur(15px); max-width: 500px; margin: 0 auto; width: 100%; }
        .auth-toggle { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 5px; margin-bottom: 2.5rem; }
        .auth-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 8px; transition: 0.3s; font-weight: 600; }
        .auth-btn.active { background: var(--primary); color: #fff; }
        input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 1.2rem; border-radius: 12px; color: var(--text-main); font-size: 1rem; outline: none; margin-bottom: 1.5rem; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
        .admin-table th, .admin-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--glass-border); }
        .status-msg { text-align: center; margin-bottom: 1rem; font-size: 0.95rem; border-radius: 10px; padding: 15px; position: fixed; top: 100px; left: 50%; transform: translateX(-50%); z-index: 2000; display: none; width: 80%; max-width: 400px; color: #fff; }
        .status-msg.error { background: var(--danger); } .status-msg.success { background: var(--success); }
        
        .back-to-home { position: fixed; top: 25px; left: 5%; z-index: 1100; padding: 0.8rem 1.5rem; background: var(--primary); color: #fff; border-radius: 30px; text-decoration: none; font-weight: 700; }

        @media screen and (max-width: 900px) {
            header { justify-content: space-between; }
            .nav-container { position: fixed; right: -100%; top:0; height:100vh; width:75%; background:var(--nav-bg); flex-direction:column; justify-content:center; }
            .nav-container.active { right: 0; }
            nav ul { flex-direction: column; }
            .menu-toggle { display: block; font-size: 1.5rem; cursor: pointer; }
        }
    </style>
</head>
<body class="loaded">
    <a href="index.html" class="back-to-home" data-lang="back_home"><i class="fas fa-arrow-left"></i> Ana Sayfa</a>

    <header>
        <div class="logo" style="display:none;">Enes D.</div> 
        <div class="menu-toggle" onclick="document.getElementById('nav-menu').classList.toggle('active')"><i class="fas fa-bars"></i></div>
        <nav class="nav-container" id="nav-menu">
            <ul>
                <li><a href="biography.html" data-lang="nav_bio">Hakkımda</a></li>
                <li><a href="about.html" data-lang="nav_about">Uzmanlıklar</a></li>
                <li><a href="projects.html" data-lang="nav_projects">Projeler</a></li>
                <li><a href="contact.html" class="active" data-lang="nav_contact">Üyelik</a></li>
            </ul>
            <div class="nav-actions">
                <button class="lang-btn active" id="btn-tr" onclick="setLanguage('tr')">TR</button> / 
                <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
                <button id="theme-toggle" class="theme-toggle-btn" style="margin-left:10px;"><i class="fas fa-moon"></i></button>
            </div>
        </nav>
    </header>

    <section id="contact">
        <div class="container">
            <h2 class="section-title" data-lang="title_auth">Üyelik Portalı</h2>
            <div class="auth-wrapper">
                <div id="status-msg" class="status-msg"></div>
                <div id="auth-ui" class="auth-card">
                    <div class="auth-toggle">
                        <button class="auth-btn active" onclick="toggleAuth('login')" data-lang="btn_login_toggle">Giriş Yap</button>
                        <button class="auth-btn" onclick="toggleAuth('register')" data-lang="btn_register_toggle">Kayıt Ol</button>
                    </div>
                    <form id="login-form">
                        <input type="email" id="login-email" placeholder="E-posta Adresi" data-lang-placeholder="ph_email" required>
                        <input type="password" id="login-password" placeholder="Şifre" data-lang-placeholder="ph_pass" required>
                        <button type="submit" style="width:100%; padding:1.2rem; border-radius:12px; background:var(--primary); border:none; color:white; font-weight:700; cursor:pointer;" data-lang="btn_login_submit">Giriş Yap</button>
                    </form>
                    <form id="register-form" style="display:none;">
                        <input type="text" id="reg-name" placeholder="Adınız Soyadınız" data-lang-placeholder="ph_name" required>
                        <input type="email" id="reg-email" placeholder="E-posta Adresi" data-lang-placeholder="ph_email" required>
                        <input type="password" id="reg-password" placeholder="Şifre (Min 6 Karakter)" data-lang-placeholder="ph_pass_min" required>
                        <button type="submit" style="width:100%; padding:1.2rem; border-radius:12px; background:var(--primary); border:none; color:white; font-weight:700; cursor:pointer;" data-lang="btn_register_submit">Kayıt Ol</button>
                    </form>
                </div>
                <div id="user-dashboard" class="auth-card" style="display:none;">
                    <div style="text-align:center;">
                        <h3 id="user-name" style="font-size: 2rem;"></h3>
                        <p id="user-email" style="font-size:1.1rem; color:var(--text-muted); margin-bottom:2rem;"></p>
                        <div id="admin-panel" style="display:none; text-align:left; border-top:1px solid var(--glass-border); padding-top:1.5rem;">
                            <h4 style="color:var(--primary); margin-bottom:1rem;" data-lang="admin_list_title">Üye Listesi (Yönetici)</h4>
                            <div style="overflow-x:auto;"><table class="admin-table"><tbody id="member-list-body"></tbody></table></div>
                        </div>
                        <button onclick="logout()" style="width:100%; padding:1rem; border-radius:10px; background:none; border:2px solid var(--danger); color:var(--danger); font-weight:700; cursor:pointer; margin-top:2.5rem;" data-lang="btn_logout">Çıkış Yap</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Enes Daşdan | Smart Portfolio</p>
    </footer>

    <script>
        const ADMIN_EMAIL = 'enesdasdan43@gmail.com'; const ADMIN_PASS = '391739';
        
        // --- ÇEVİRİ SİSTEMİ ---
        const translations = {
            tr: {
                nav_bio: "Hakkımda", nav_about: "Uzmanlıklar", nav_projects: "Projeler", nav_contact: "Üyelik",
                title_auth: "Üyelik Portalı",
                btn_login_toggle: "Giriş Yap", btn_register_toggle: "Kayıt Ol",
                ph_email: "E-posta Adresi", ph_pass: "Şifre", ph_name: "Adınız Soyadınız", ph_pass_min: "Şifre (Min 6 Karakter)",
                btn_login_submit: "Giriş Yap", btn_register_submit: "Kayıt Ol",
                admin_list_title: "Üye Listesi (Yönetici)", btn_logout: "Çıkış Yap",
                back_home: '<i class="fas fa-arrow-left"></i> Ana Sayfa'
            },
            en: {
                nav_bio: "About Me", nav_about: "Expertise", nav_projects: "Projects", nav_contact: "Membership",
                title_auth: "Membership Portal",
                btn_login_toggle: "Login", btn_register_toggle: "Register",
                ph_email: "Email Address", ph_pass: "Password", ph_name: "Full Name", ph_pass_min: "Password (Min 6 Chars)",
                btn_login_submit: "Login", btn_register_submit: "Sign Up",
                admin_list_title: "Member List (Admin)", btn_logout: "Log Out",
                back_home: '<i class="fas fa-arrow-left"></i> Home'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'tr';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // Text İçerikleri
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (translations[lang][key]) el.innerHTML = translations[lang][key];
            });

            // Placeholderlar
            document.querySelectorAll('[data-lang-placeholder]').forEach(el => {
                const key = el.getAttribute('data-lang-placeholder');
                if (translations[lang][key]) el.placeholder = translations[lang][key];
            });
            
            // Giriş yapmışsa panel butonunu güncellemek gerekebilir ama contact.html zaten panel
            checkSession(); 
        }

        // AUTH KODLARI
        function checkSession() {
            const name = localStorage.getItem('sessionUserName');
            const email = localStorage.getItem('sessionUserEmail');
            if (name && email) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-dashboard').style.display = 'block';
                document.getElementById('user-email').innerText = email;
                if (email === ADMIN_EMAIL) {
                    document.getElementById('user-name').innerText = currentLang === 'en' ? "Boss" : "Patron";
                    document.getElementById('admin-panel').style.display = 'block';
                    loadMembers(); 
                } else { document.getElementById('user-name').innerText = `${name}`; }
            }
        }
        document.getElementById('login-form').addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('login-email').value, pass = document.getElementById('login-password').value;
            const db = JSON.parse(localStorage.getItem('enes_portfolio_users') || '[]');
            const user = db.find(u => u.email === email && u.password === pass);
            if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
                localStorage.setItem('sessionUserName', "Enes"); localStorage.setItem('sessionUserEmail', email);
                checkSession();
            } else if (user) {
                localStorage.setItem('sessionUserName', user.name); localStorage.setItem('sessionUserEmail', email);
                checkSession();
            } else { alert("Hatalı giriş!"); }
        });
        document.getElementById('register-form').addEventListener('submit', e => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value, email = document.getElementById('reg-email').value, pass = document.getElementById('reg-password').value;
            let db = JSON.parse(localStorage.getItem('enes_portfolio_users') || '[]');
            db.push({name, email, password: pass});
            localStorage.setItem('enes_portfolio_users', JSON.stringify(db));
            localStorage.setItem('sessionUserName', name); localStorage.setItem('sessionUserEmail', email);
            checkSession();
        });
        window.logout = () => { localStorage.removeItem('sessionUserName'); localStorage.removeItem('sessionUserEmail'); location.reload(); };
        function loadMembers() { const db = JSON.parse(localStorage.getItem('enes_portfolio_users') || '[]'); document.getElementById('member-list-body').innerHTML = db.map(m => `<tr><td>${m.name}</td><td>${m.email}</td></tr>`).join(''); }
        function toggleAuth(type) {
            const isLogin = type === 'login';
            document.getElementById('login-form').style.display = isLogin ? 'block' : 'none';
            document.getElementById('register-form').style.display = isLogin ? 'none' : 'block';
            document.querySelectorAll('.auth-btn')[0].classList.toggle('active', isLogin);
            document.querySelectorAll('.auth-btn')[1].classList.toggle('active', !isLogin);
        }
        
        // Başlat
        setLanguage(currentLang);
        
        document.getElementById('theme-toggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); });
        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        
        const themeBtn = document.getElementById('theme-toggle');
        function updateThemeIcon() { const isLight = document.body.classList.contains('light-mode'); themeBtn.querySelector('i').className = isLight ? 'fas fa-sun' : 'fas fa-moon'; }
        themeBtn.addEventListener('click', () => { localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); updateThemeIcon(); });
        updateThemeIcon();
    </script>
</body>
