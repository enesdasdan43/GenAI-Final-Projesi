<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevQuiz - Yazılımcı Bilgi Yarışması</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="area" >
        <ul class="circles">
                <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
        </ul>
    </div >

    <div class="game-container">
        
        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <div class="logo-container">
                <div class="glow-orb"></div>
                <div class="logo-icon"><i class="fas fa-terminal"></i></div>
            </div>
            <h1 class="game-title">Dev<span>Quiz</span></h1>
            <p class="game-subtitle">Kodlama becerilerini kanıtla, liderlik tablosuna adını yazdır!</p>

            <div class="selection-container">
                <h3 class="selection-title">Kategori Seçimi</h3>
                <div class="category-grid">
                    <button class="category-btn active" data-cat="html">
                        <i class="fab fa-html5"></i> HTML
                    </button>
                    <button class="category-btn" data-cat="css">
                        <i class="fab fa-css3-alt"></i> CSS
                    </button>
                    <button class="category-btn" data-cat="js">
                        <i class="fab fa-js"></i> JavaScript
                    </button>
                    <button class="category-btn" data-cat="python">
                        <i class="fab fa-python"></i> Python
                    </button>
                </div>

                <h3 class="selection-title mt-4">Zorluk Seviyesi</h3>
                <div class="difficulty-grid">
                    <button class="diff-btn active" data-diff="easy">Kolay (30s)</button>
                    <button class="diff-btn" data-diff="medium">Orta (20s)</button>
                    <button class="diff-btn" data-diff="hard">Zor (10s)</button>
                </div>
            </div>

            <button id="startBtn" class="primary-btn">
                <span>Oyuna Başla</span>
                <i class="fas fa-rocket"></i>
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div class="quiz-header">
                <div class="stat-box">
                    <i class="fas fa-star" style="color: #ffd700;"></i>
                    <span id="score">0</span>
                </div>
                <div class="stat-box">
                    Soru <span id="questionCount">1</span>/10
                </div>
                <div class="stat-box timer-box">
                    <i class="fas fa-clock"></i>
                    <span id="timer">30</span>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="timeBar"></div>
            </div>

            <div id="comboContainer" class="combo-container hidden">
                <i class="fas fa-fire"></i> <span id="comboText">2x Kombo!</span>
            </div>

            <div class="question-card">
                <div class="category-badge" id="qCategory">JavaScript</div>
                <h2 id="questionText">Soru metni buraya gelecek...</h2>
            </div>

            <div class="options-grid" id="optionsGrid">
                <!-- Options injected via JS -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="resultScreen" class="screen">
            <div class="result-header">
                <div class="result-icon" id="resultIcon">🏆</div>
                <h1 id="resultTitle">Tebrikler!</h1>
                <p id="resultSubtitle">Harika bir iş çıkardın.</p>
            </div>

            <div class="score-circle-container">
                <svg class="progress-ring" width="150" height="150">
                    <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" r="65" cx="75" cy="75"/>
                    <circle class="progress-ring__circle" id="scoreCircle" stroke="url(#gradient)" stroke-width="8" fill="transparent" r="65" cx="75" cy="75"/>
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#4facfe" />
                            <stop offset="100%" stop-color="#00f2fe" />
                        </linearGradient>
                    </defs>
                </svg>
                <div class="score-text-inner">
                    <span id="finalScore">0</span>
                    <small>Puan</small>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item correct">
                    <i class="fas fa-check-circle"></i>
                    <div class="stat-details">
                        <span id="correctCount">0</span>
                        <small>Doğru</small>
                    </div>
                </div>
                <div class="stat-item wrong">
                    <i class="fas fa-times-circle"></i>
                    <div class="stat-details">
                        <span id="wrongCount">0</span>
                        <small>Yanlış</small>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button id="restartBtn" class="secondary-btn">
                    <i class="fas fa-redo"></i> Tekrar Oyna
                </button>
            </div>
        </div>

    </div>

    <!-- Feedback Overlay -->
    <div id="feedbackOverlay" class="feedback-overlay hidden">
        <div class="feedback-content">
            <i id="feedbackIcon" class="fas fa-check-circle"></i>
            <h2 id="feedbackTitle">Doğru!</h2>
            <p id="feedbackPoints">+100 Puan</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
